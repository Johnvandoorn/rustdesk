name: Cadware Flutter build.yml

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout (incl. submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Enable long paths (git)
        run: git config --system core.longpaths true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show versions
        run: |
          flutter --version
          dart --version
          rustc -Vv
          cargo -V

      # (optioneel) je secrets worden doorgegeven als env
      - name: Echo server env (debug)
        shell: bash
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          echo "RENDEZVOUS_SERVER=${RENDEZVOUS_SERVER}"
          echo "RELAY_SERVER=${RELAY_SERVER}"
          echo "RS_PUB_KEY set? $([[ -n "$RS_PUB_KEY" ]] && echo yes || echo no)"

      - name: Install Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Build Windows (Release)
        working-directory: flutter
        run: flutter build windows --release --verbose

      - name: Package ZIP
        shell: pwsh
        run: |
          $APPDIR="flutter/build/windows/x64/runner/Release"
          if (-not (Test-Path $APPDIR)) { Get-ChildItem -Recurse flutter/build | Select-Object -Last 200; exit 1 }
          $ART="cadware-rustdesk-windows-${{ github.run_id }}.zip"
          Compress-Archive -Path "$APPDIR/*" -DestinationPath "$ART"
          Write-Host "Created $ART"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadware-rustdesk-windows
          path: cadware-rustdesk-windows-*.zip
          if-no-files-found: error
