name: RustDesk Windows Build (Flutter)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
      RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
      RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Create artifact name from domain
        id: namegen
        shell: pwsh
        run: |
          $domain = "${{ env.RENDEZVOUS_SERVER }}"
          $domain = $domain.ToLower() -replace '^https?://','' -replace ':[0-9]+$',''
          $safe = $domain -replace '\.+','-' -replace '[^a-z0-9\-]',''
          if ([string]::IsNullOrWhiteSpace($safe)) { $safe = "unknown-domain" }
          $art = "rustdesk-windows-$safe-${{ github.run_number }}.zip"
          "ARTIFACT_NAME=$art" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Artifact name: $art"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          $outDir = "build/windows/x64/runner/Release"
          $zipName = "${{ steps.namegen.outputs.ARTIFACT_NAME }}"
          Compress-Archive -Path "$outDir/*" -DestinationPath $zipName
          Write-Host "Created ZIP: $zipName"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: ${{ steps.namegen.outputs.ARTIFACT_NAME }}
